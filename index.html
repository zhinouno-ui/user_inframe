*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080f; --surface:#13131f; --surface-2:#1b1b2b; --surface-3:#24243a;
  --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.14);
  --text:#f4f5fb; --muted:#9298ad;
  --gold:#f5c542; --gold-2:#ffd980; --green:#26d07c; --blue:#5b78ff; --danger:#ff5468;
  --r:22px; --r-sm:14px; --shadow:0 26px 80px rgba(0,0,0,.55);
  --font:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
body,button,input,textarea{font-family:var(--font)}
::selection{background:rgba(245,197,66,.3)}

/* Casino de fondo */
#appFrame{position:fixed;inset:0;width:100vw;height:100vh;border:0;background:var(--bg);z-index:1}

/* ── Botón flotante lanzador ───────────────────────────────────────────── */
.float-btn{
  position:fixed;right:20px;bottom:20px;z-index:20;border:none;cursor:pointer;
  display:flex;align-items:center;gap:11px;padding:0 20px 0 14px;height:58px;border-radius:999px;
  background:linear-gradient(135deg,#ffdf7e,var(--gold) 55%,#e9a700);
  color:#231900;font-weight:800;font-size:15px;letter-spacing:.2px;
  box-shadow:0 14px 34px rgba(245,197,66,.42),0 10px 40px rgba(0,0,0,.5);
  transition:transform .18s ease, box-shadow .18s ease;
}
.float-btn:hover{transform:translateY(-2px)}
.float-btn:active{transform:scale(.96)}
.float-btn .fb-ico{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.16);font-size:18px}
.float-btn .fb-sub{display:block;font-size:10px;font-weight:700;opacity:.7;letter-spacing:.3px;text-transform:uppercase;margin-top:-1px}

/* ── Widget ────────────────────────────────────────────────────────────── */
.widget{
  position:fixed;right:20px;bottom:90px;z-index:30;
  width:404px;max-width:calc(100vw - 28px);height:640px;max-height:calc(100vh - 116px);
  background:linear-gradient(180deg,#15151f,#0c0c15);
  border:1px solid var(--line-2);border-radius:26px;box-shadow:var(--shadow);
  overflow:hidden;display:none;flex-direction:column;
  transform-origin:bottom right;
}
.widget.open{display:flex;animation:popIn .26s cubic-bezier(.2,.9,.25,1)}
@keyframes popIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}

/* Header */
.widget-head{
  position:relative;flex-shrink:0;padding:16px 16px 15px;display:flex;align-items:center;gap:12px;
  background:radial-gradient(140% 120% at 90% -20%,rgba(245,197,66,.22),transparent 50%),linear-gradient(135deg,#1b1c2c,#101019);
  border-bottom:1px solid var(--line);
}
.head-avatar{width:42px;height:42px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--gold),#e6a400);color:#221900;font-weight:900;font-size:13px;letter-spacing:-.5px;
  box-shadow:0 6px 16px rgba(245,197,66,.3)}
.head-info{flex:1;min-width:0}
.brand-logo{font-size:17px;font-weight:900;letter-spacing:-.3px;line-height:1.1}
.brand-logo span:first-child{color:var(--gold)}
.head-sub{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px}
.head-sub .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(38,208,124,.18)}
.icon-btn{border:none;background:rgba(255,255,255,.07);color:#cfd3e0;border-radius:12px;width:36px;height:36px;cursor:pointer;font-size:20px;line-height:1;transition:background .15s}
.icon-btn:hover{background:rgba(255,255,255,.14)}

/* Banner conexión */
#connBanner{background:linear-gradient(90deg,#3a0d12,#4a1118);color:#ffb3bd;font-size:12px;font-weight:700;padding:8px 16px;align-items:center;gap:8px;border-bottom:1px solid rgba(255,84,104,.25);flex-shrink:0}

/* Body */
.widget-body{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth;
  background:radial-gradient(120% 80% at 15% 0%,rgba(91,120,255,.10),transparent 40%),radial-gradient(120% 80% at 100% 30%,rgba(245,197,66,.07),transparent 42%),var(--bg)}
.widget-body::-webkit-scrollbar{width:8px}
.widget-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:8px}
.widget-body::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}

.hidden{display:none!important}

/* ── Tarjetas base ─────────────────────────────────────────────────────── */
.welcome-card,.form-box,.user-gate{
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
  border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
}
.user-gate{border-color:rgba(245,197,66,.22)}
.user-gate.pending-mode{border-color:rgba(245,197,66,.4);background:linear-gradient(180deg,rgba(245,197,66,.10),rgba(245,197,66,.03))}
.user-gate-title{font-weight:900;font-size:19px;margin-bottom:8px;letter-spacing:-.3px}
.welcome-title{font-weight:900;font-size:19px;margin-bottom:6px;letter-spacing:-.3px}
.welcome-txt{font-size:13.5px;color:#cfd3e2;line-height:1.5}
.flow-note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:10px}
.form-box.submitted{display:none!important}
.main-menu-disabled{display:none!important}

/* Chip de usuario */
.user-chip{display:inline-flex;align-items:center;gap:7px;background:rgba(245,197,66,.13);border:1px solid rgba(245,197,66,.3);
  color:var(--gold-2);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:800;margin:10px 0 2px}
.link-btn{border:none;background:transparent;color:var(--gold-2);font-size:12.5px;font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:0;margin-top:10px;display:inline-block}
.link-btn:hover{color:var(--gold)}

/* ── Menú de acciones rápidas ──────────────────────────────────────────── */
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
.quick{
  position:relative;border:1px solid var(--line-2);background:linear-gradient(170deg,#1e1e30,#161623);
  color:var(--text);border-radius:18px;padding:15px 14px;cursor:pointer;text-align:left;font-weight:800;font-size:14.5px;
  min-height:80px;line-height:1.25;transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;overflow:hidden;
}
.quick::before{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 100% 0%,rgba(255,255,255,.06),transparent 60%);pointer-events:none}
.quick:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(0,0,0,.32)}
.quick:active{transform:translateY(-1px) scale(.99)}
.quick small{display:block;color:var(--muted);font-size:11.5px;font-weight:600;margin-top:6px;line-height:1.35}
.quick.gold{background:linear-gradient(165deg,#33290f,#1a1726);border-color:rgba(245,197,66,.4)}
.quick.gold:hover{border-color:rgba(245,197,66,.7)}
.quick.green{background:linear-gradient(165deg,#0f3322,#161a26);border-color:rgba(38,208,124,.36)}
.quick.green:hover{border-color:rgba(38,208,124,.6)}

/* ── Inputs ────────────────────────────────────────────────────────────── */
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:#aab0c4;font-weight:800;margin-bottom:6px}
input,textarea{
  width:100%;border:1px solid var(--line-2);background:#0e0e19;color:var(--text);
  border-radius:var(--r-sm);padding:13px 14px;font-size:15px;margin-bottom:11px;transition:border-color .15s,box-shadow .15s;
}
input::placeholder,textarea::placeholder{color:#5a607a}
input:focus,textarea:focus{outline:none;border-color:rgba(245,197,66,.65);box-shadow:0 0 0 3px rgba(245,197,66,.16)}
textarea{resize:vertical;min-height:76px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Botones ───────────────────────────────────────────────────────────── */
.action-btn{
  width:100%;border:none;border-radius:var(--r-sm);padding:14px;font-weight:900;font-size:14.5px;cursor:pointer;margin-top:4px;
  background:linear-gradient(135deg,#ffdf7e,var(--gold) 60%,#eaa800);color:#241a00;
  box-shadow:0 10px 24px rgba(245,197,66,.26);transition:transform .15s,box-shadow .15s,filter .15s;
}
.action-btn:hover{filter:brightness(1.04);box-shadow:0 14px 30px rgba(245,197,66,.34)}
.action-btn:active{transform:scale(.985)}
.action-btn:disabled{opacity:.6;cursor:default;box-shadow:none}
.secondary-btn{background:#23233a;color:var(--text);border:1px solid var(--line-2);box-shadow:none}
.secondary-btn:hover{filter:none;background:#2b2b46;box-shadow:none}

/* ── Mensajes (chat) ───────────────────────────────────────────────────── */
.msg{display:flex;flex-direction:column;margin-bottom:12px;max-width:90%;animation:msgIn .22s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.bot,.msg.sys{align-items:flex-start;margin-right:auto}
.msg.user{align-items:flex-end;margin-left:auto}
.bubble{padding:11px 14px;border-radius:18px;font-size:13.5px;line-height:1.45;word-break:break-word;white-space:pre-wrap;box-shadow:0 8px 20px rgba(0,0,0,.2)}
.msg.bot .bubble,.msg.sys .bubble{background:var(--surface-2);color:#eef0f7;border:1px solid var(--line);border-bottom-left-radius:6px}
.msg.user .bubble{background:linear-gradient(135deg,#4f6bff,#7b8cff);color:#fff;border-bottom-right-radius:6px}
.meta{font-size:10.5px;color:var(--muted);padding:4px 5px 0}
.bubble img.chat-img{max-width:100%;border-radius:12px;margin-top:8px;display:block;cursor:pointer;border:1px solid var(--line-2)}
.status-pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:800;
  background:rgba(245,197,66,.14);color:var(--gold-2);border:1px solid rgba(245,197,66,.3);margin:8px 0 2px}

/* ── Tarjeta de transferencia ──────────────────────────────────────────── */
.transfer-card{background:linear-gradient(180deg,#211f12,#14121c);border:1px solid rgba(245,197,66,.45);border-radius:18px;padding:15px;margin:12px 0;box-shadow:0 14px 30px rgba(0,0,0,.3)}
.transfer-title{font-weight:900;color:var(--gold);font-size:15.5px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.transfer-field{background:#0c0c16;border-radius:13px;padding:11px 12px;margin-bottom:9px;border:1px solid var(--line)}
.transfer-label{font-size:10px;color:#9aa0b4;text-transform:uppercase;font-weight:800;letter-spacing:.5px;margin-bottom:5px}
.transfer-value{font-size:15px;font-weight:800;color:#fff;word-break:break-all;margin-bottom:9px;letter-spacing:.2px}
.copy-btn{border:none;border-radius:11px;background:#26263e;color:#fff;padding:10px;font-size:12.5px;font-weight:800;cursor:pointer;width:100%;transition:background .15s}
.copy-btn:hover{background:#32324f}
.copy-btn:active{background:var(--blue)}

/* ── Pendiente ─────────────────────────────────────────────────────────── */
.pending-box{background:linear-gradient(180deg,rgba(245,197,66,.1),rgba(245,197,66,.03));border:1px solid rgba(245,197,66,.3);border-radius:var(--r);padding:16px;margin:14px 0}
.pending-title{font-weight:900;color:var(--gold-2);font-size:16px;margin-bottom:7px}
.pending-text{font-size:13px;color:#cfd3e2;line-height:1.5}
.pending-actions{display:flex;gap:9px;margin-top:12px;flex-wrap:wrap}
.pending-actions .action-btn{margin:0;flex:1;min-width:130px}
.pending-only-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
.pending-only-actions button{margin:0}

/* ── Compose ───────────────────────────────────────────────────────────── */
.widget-compose{flex-shrink:0;border-top:1px solid var(--line);background:#0f0f1a;padding:12px;min-height:66px}
.widget-compose.locked{display:flex!important;align-items:center;justify-content:center;color:var(--muted);font-size:13px;font-weight:700;text-align:center;padding:14px 16px}
.widget-compose.locked #composeLockText{width:100%;line-height:1.4}
.widget-compose:not(.locked){display:grid!important;grid-template-columns:44px 1fr 46px;gap:9px;align-items:end}
.widget-compose:not(.locked) #composeLockText{display:none}
.widget-compose.locked textarea,.widget-compose.locked button,.widget-compose.locked .clip-btn{display:none!important}
#freeInput{min-height:44px;height:44px;max-height:96px;overflow:auto;margin:0;resize:none;border-radius:14px;font-size:14px;padding:11px 13px}
.send-btn{height:44px;width:46px;padding:0;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;
  background:linear-gradient(135deg,#5b78ff,#7b8cff);color:#fff;box-shadow:0 8px 18px rgba(91,120,255,.35);transition:transform .15s}
.send-btn:active{transform:scale(.92)}
.clip-btn{height:44px;width:44px;padding:0;border:none;border-radius:14px;background:rgba(255,255,255,.07);color:#aeb3c6;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.clip-btn:hover{background:rgba(255,255,255,.15)}

/* Preview de imagen (oculto por inline display:none; el JS lo muestra con display:"") */
#imgPreviewBar{display:flex;align-items:center;background:#0f0f1a;padding:8px 12px;border-top:1px solid var(--line);flex-shrink:0}
#imgPreviewBar .img-bar-inner{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.06);border-radius:11px;padding:6px 9px;width:100%}
#imgPreviewBar img{width:36px;height:36px;object-fit:cover;border-radius:8px;flex-shrink:0}
#imgPreviewBar span{font-size:11.5px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#imgPreviewBar button{border:none;background:none;color:var(--muted);cursor:pointer;font-size:21px;line-height:1;padding:0 2px;flex-shrink:0}

/* Helpers heredados (por compatibilidad con HTML inyectado) */
.file-label{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--surface-2);border:1px dashed var(--line-2);border-radius:14px;padding:12px;color:#e8ebf5;font-size:13px;font-weight:800;cursor:pointer;margin-bottom:11px}
.file-preview{display:none;background:rgba(255,255,255,.06);border-radius:13px;padding:8px;margin-bottom:11px;align-items:center;gap:10px}
.file-preview.show{display:flex}.file-preview img{width:54px;height:54px;object-fit:cover;border-radius:10px}

/* Toast */
.toast{position:fixed;left:50%;bottom:106px;transform:translateX(-50%) translateY(10px);z-index:60;
  background:#16161f;color:#fff;border:1px solid var(--line-2);box-shadow:var(--shadow);
  padding:13px 18px;border-radius:14px;font-weight:800;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Responsive ────────────────────────────────────────────────────────── */
@media(max-width:700px){
  .float-btn{right:14px;bottom:16px;height:54px;padding:0 17px 0 12px}
  .widget{right:10px;left:10px;bottom:80px;width:auto;height:74vh;max-height:74vh;border-radius:24px}
  .form-row{grid-template-columns:1fr}
}
@media(max-width:420px){
  .quick-grid{grid-template-columns:1fr}
  .pending-only-actions{grid-template-columns:1fr}
  .float-btn .fb-text{display:none}
  .float-btn{padding:0;width:54px;justify-content:center;gap:0}
  .float-btn .fb-ico{margin:0}
  .widget{height:80vh;max-height:80vh}
}
</style>
</head>

async function rpc(fn,params){if(!sb)return{data:null,error:{message:"Supabase no configurado"}};const{data,error}=await sb.rpc(fn,params||{});return{data,error}}
function normalize(data){if(!data)return null;if(Array.isArray(data))return data[0]||null;if(data.data)return Array.isArray(data.data)?data.data[0]:data.data;return data}

async function pollOperatorMessages(){
  if(!state.chatId||!$("widget")?.classList.contains("open"))return;
  const res=await rpc("landing_leer_chat_v2",{p_chat_id:Number(state.chatId),p_chat_token:state.chatToken});
  if(res.error||!Array.isArray(res.data)){_onPollFail();return;}
  _onPollOk();
  res.data.forEach(m=>{
    const msgKey=String(m.id||m.created_at||JSON.stringify(m));
    if(state.seenMsgIds.has(msgKey))return;
    state.seenMsgIds.add(msgKey);
    const emisor=String(m.tipo_emisor||m.emisor||"").toUpperCase();
    const isOp=emisor.includes("OPER")||emisor.includes("ADMIN")||emisor.includes("PANEL")||emisor.includes("SIST")||emisor.includes("BOT")||emisor.includes("AUTO");
    const texto=m.mensaje||m.texto||"";
    // Convertir \n a <br> para que los saltos de línea del panel se vean correctamente
    if(isOp&&(texto||m.imagen_url)){const tk=(texto||m.imagen_url||"").substring(0,200);if(state.shownTexts.has(tk))return;state.shownTexts.add(tk);addMsg(escMsg(texto),"bot",m.imagen_url||null);if(texto)notificarLocal("BET300 · Operador",texto.substring(0,100),"/","bet300-op");}
  });
}

function threadKey(m){
  return String((m?.origen||"")+"|"+(m?.solicitud_id||"")+"|"+(m?.fecha||"")+"|"+(m?.mensaje||""));
}
async function pollPortalThread(){
  if(!state.usuario||!$("widget")?.classList.contains("open"))return;
  const res=await rpc("landing_portal_chat_thread_get",{p_usuario:state.usuario,p_public_code:state.publicCode});
  if(res.error){console.warn("[chat_thread]",res.error);_onPollFail();return;}
  _onPollOk();
  const d=normalize(res.data)||res.data||{};
  const thread=Array.isArray(d.chat_thread)?d.chat_thread:[];
  if(!thread.length)return;

  thread.forEach(m=>{
    const key=threadKey(m);
    if(state.portalThreadSeen.has(key))return;
    state.portalThreadSeen.add(key);

    const origen=String(m.origen||"").toUpperCase();
    const texto=m.mensaje||"";
    if(origen==="OPERADOR"&&(m.imagen_url||m.imagen))console.log("[thread-img]",{fecha:m.fecha,imagen_url:m.imagen_url,imagen:m.imagen?.substring?.(0,60)});
    // Mostramos en portal solo respuestas del panel/operador para evitar duplicar mensajes propios
    if(origen==="OPERADOR"&&(texto||m.imagen_url||m.imagen)){
      const imgUrl=m.imagen_url||m.imagen||null;
      // Use fecha as disambiguator for image-only messages (base64 JPEGs share same first chars)
      const tk=texto?texto.substring(0,200):(m.fecha||"")+"|img|"+(imgUrl||"").substring(0,80);
      if(state.shownTexts.has(tk))return;
      state.shownTexts.add(tk);
      addMsg(escMsg(texto),"bot",imgUrl);
      if(!texto&&imgUrl)notificarLocal("BET300 · Operador","[Imagen]","/","bet300-op");
    }
  });
  savePortalThreadSeen();
}

function estadoNormalizado(v){return String(v||"").trim().toUpperCase();}
function esEstadoFinalAprobado(v){
  const e=estadoNormalizado(v);
  // Solo estados verdaderamente finales — APROBADA_MANUAL es intermedio (pre-ejecución)
  return ["ACREDITADA","PAGADA","COMPLETADA"].includes(e);
}
function esEstadoFinalRechazado(v){
  const e=estadoNormalizado(v);
  return ["RECHAZADA","CANCELADA","ERROR"].includes(e);
}
// Acepta IDs numéricos O strings no vacíos (UUIDs también son válidos)
function solicitudIdValido(){

function limpiarPendienteAprobado(obs){
  if(estadoFinalNotificado)return;

  const old=document.getElementById("pendingBox");if(old)old.remove();

  const msgs=$("messages");

  const textoBase=esRetiro?"✅ ¡Tu retiro fue procesado! Revisá tu cuenta bancaria.":"✅ ¡Tu carga fue acreditada! Ya podés jugar.";
  const textoObs=obs?`<br><span style="font-size:12px;opacity:.8">${escMsg(obs)}</span>`:"";
  addMsg(textoBase+textoObs,"bot");
  const notifTitulo=esRetiro?"BET300 · ¡Retiro procesado!":"BET300 · ¡Carga acreditada!";
  const notifCuerpo=obs||(esRetiro?"Tu retiro fue transferido. Revisá tu cuenta.":"¡Tus fichas ya están disponibles! Revisá tu cuenta.");
  notificarLocal(notifTitulo,notifCuerpo,"/","bet300-acreditada");
  renderUserGate();
  setComposeEnabled(false,"Elegí una opción para continuar.");
  const body=$("widgetBody");if(body)body.scrollTop=0;

function esConfirmacionDemasiadoTemprana(){
  const started=Number(state.solicitudStartedAt||localStorage.getItem("bet300_solicitud_started_at")||0);
  if(!started)return false;
  return (Date.now()-started)<8000;
}
async function consultarEstadoSolicitud(mostrarMensaje=true){
  const sid=solicitudIdValido();
  if(!sid){if(mostrarMensaje)addMsg("No hay una solicitud válida para consultar en este dispositivo.","bot");return null;}
  const chatIdNum=/^\d+$/.test(String(state.chatId||""))?Number(state.chatId):null;
  const res=await rpc("landing_estado_solicitud_segura",{
    p_solicitud_id:typeof sid==="number"?sid:0,
    p_chat_id:chatIdNum,
    p_chat_token:state.chatToken||""
  });
  if(res.error){if(mostrarMensaje)addMsg("No pude consultar el estado ahora. Intentá en unos minutos.","bot");return null;}
  const d=normalize(res.data)||res.data||{};
  if(d.ok===false){if(mostrarMensaje)addMsg("Estado actual: <b>En verificación</b>","bot");return "PENDIENTE";}
  const estado=estadoNormalizado(d.estado||d.status||d.estado_solicitud);
  const obs=String(d.obs||d.observacion||d.motivo||d.razon||"").trim();
  if(esEstadoFinalAprobado(estado)){
    if(esConfirmacionDemasiadoTemprana()){if(mostrarMensaje)addMsg("Estado actual: <b>En verificación</b>","bot");return "PENDIENTE";}
    limpiarPendienteAprobado(obs);
    return estado;
  }
  if(esEstadoFinalRechazado(estado)){
    rechazadoStreak++;
    // Confirmar con 3 polls consecutivos antes de mostrar rechazo (evita falsos positivos de estados transitorios)
    if(rechazadoStreak < 3){
      if(mostrarMensaje)addMsg("Estado actual: <b>En verificación</b>","bot");
      return "PENDIENTE";
    }
    stopEstadoPoll();
    rechazadoStreak=0;
    const old=document.getElementById("pendingBox");if(old)old.remove();
    state.pendingTipo="";state.solicitudId="";
    ["bet300_pending_tipo","bet300_solicitud_id","bet300_solicitud_started_at"].forEach(k=>localStorage.removeItem(k));
    const motivoRechazo=obs?`<br><span style="font-size:12px;opacity:.8">${escMsg(obs)}</span>`:"";
    addMsg("Tu solicitud no pudo procesarse."+motivoRechazo+`<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap"><button class="action-btn" style="font-size:13px;padding:10px;margin:0;flex:1;min-width:120px" onclick="startFlow('SOPORTE')">Iniciar consulta</button><button class="action-btn secondary-btn" style="font-size:13px;padding:10px;margin:0;flex:1;min-width:120px" onclick="startFlow('CARGA')">Nueva carga</button></div>`,"bot");
    renderUserGate();
    return estado;
  }
  rechazadoStreak=0; // resetear streak si el estado no es rechazo
  if(mostrarMensaje)addMsg("Estado actual: <b>En verificación</b>","bot");
  return estado||"PENDIENTE";
}

async function iniciarValidacionUsuarioBackground(usuario){
  const u=String(usuario||"").trim();
  if(!u)return;
  try{
    const r=await rpc("landing_validar_usuario_login",{p_usuario:u,p_pc_codigo:state.pcCodigo||"P1"});
    if(r.error)return;
    const row=normalize(r.data)||r.data||{};
    const validacionId=row.validacion_id||row.id||null;
    if(validacionId)localStorage.setItem("bet300_validacion_id",String(validacionId));
    if(validacionId){
      let intentos=0;
      const t=setInterval(async()=>{
        intentos++;
        if(intentos>8){clearInterval(t);return;}
        const st=await rpc("landing_estado_validacion_usuario",{p_validacion_id:Number(validacionId)});
        if(st.error)return;
        const sr=normalize(st.data)||st.data||{};
        const estado=estadoNormalizado(sr.estado||sr.status);
        if(["EXISTE","EXISTIR","NO_EXISTE","ERROR","RECHAZADO"].includes(estado)){clearInterval(t);localStorage.setItem("bet300_validacion_estado",estado);}
      },2500);
    }
  }catch(e){}
}

async function subirImagen(file){
  if(!sb||!file)return null;
  if(file.size>5*1024*1024){toast("El archivo supera 5 MB");return null;}
  const ext=(file.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,"jpg");
  const path=`${(state.usuario||"anonimo").replace(/[^a-z0-9_-]/gi,"_")}/${Date.now()}_${Math.random().toString(36).slice(2,6)}.${ext}`;
  try{
    const{data:upData,error}=await sb.storage.from("comprobantes").upload(path,file,{cacheControl:"3600",upsert:true,contentType:file.type});
    if(error){console.error("[img upload error]",error.message||error);toast("No se pudo subir la imagen");return null;}
    const{data:urlData}=sb.storage.from("comprobantes").getPublicUrl(path);
    const url=urlData?.publicUrl||null;
    console.log("[img upload ok]",url);
    return url;
  }catch(e){console.error("[img upload exception]",e);return null;}
}

function queueComposerFile(input){

  state.composerImage=file;
  const thumb=$("imgPreviewThumb"),nom=$("imgPreviewName"),bar=$("imgPreviewBar");

// ── Billetera ─────────────────────────────────────────────────────────────
function inferirTipoBilletera(b){
  const raw=[b?.banco,b?.tipo,b?.nombre_visible,b?.nombre,b?.alias,b?.cbu,b?.cvu].map(x=>String(x||"").toUpperCase()).join(" ");
  const alias=String(b?.alias||"").toLowerCase();
  const cbu=String(b?.cbu||b?.cvu||"");
  if(alias.endsWith(".mp")||cbu.startsWith("00000031")||raw.includes("MERCADO"))return "Mercado Pago";
  if(raw.includes("NARANJA")||raw.includes("NX")||cbu.startsWith("453"))return "Naranja X";
  if(raw.includes("UALA")||raw.includes("UALÁ"))return "Ualá";
  if(raw.includes("PERSONAL"))return "Personal Pay";
  if(raw.includes("BRUBANK"))return "Brubank";
  if(raw.includes("BANCO"))return "Banco";
  return "Billetera";
}
async function obtenerBilletera(){
  const pcs=[state.pcCodigo,"P1"].map(v=>String(v||"").trim().toUpperCase()).filter(Boolean);
  for(const pc of [...new Set(pcs)]){
    const segura=await rpc("landing_obtener_billetera_segura",{
      p_validacion_usuario_id:Number(localStorage.getItem("bet300_validacion_id")||0),
      p_usuario:state.usuario||"",p_nombre_completo:state.usuario||"",
      p_telefono:"",p_dni:"",p_pc_codigo:pc
    });
    if(!segura.error&&segura.data&&segura.data.length){state.billetera=normalize(segura.data)||segura.data[0];return state.billetera;}
    const publica=await rpc("landing_obtener_billetera",{p_pc_codigo:pc});
    if(!publica.error&&publica.data&&publica.data.length){state.billetera=normalize(publica.data)||publica.data[0];return state.billetera;}
  }
  state.billetera=null;return null;
}
function billeteraPayloadPlano(){
  const b=state.billetera||{};
  return {billetera_id:b.id||b.billetera_id||null,billetera_nombre:b.nombre_visible||b.nombre||"",billetera_titular:b.titular||"",billetera_alias:b.alias||"",billetera_cbu:b.cbu||b.cvu||"",billetera_banco:inferirTipoBilletera(b)};
}

function _vapidKey(b64){
  const pad="=".repeat((4-b64.length%4)%4);
  const raw=atob((b64+pad).replace(/-/g,"+").replace(/_/g,"/"));
  const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);
  return out;
}
async function subscribePush(){
  if(!("serviceWorker" in navigator)||!("PushManager" in window)||!state.usuario)return;
  try{
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();

      if(perm!=="granted")return;
      sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:_vapidKey(VAPID_PUB_KEY)});

    startEstadoPoll();
    chequearPendienteViejo();
  }
  if(state.chatId&&$("widget")?.classList.contains("open"))startChatPoll();
  if(state.usuario&&$("widget")?.classList.contains("open"))startPortalThreadPoll();
});
</script>
