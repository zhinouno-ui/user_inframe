<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0a0a12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>BET300 · Portal V17</title>

<style>
/* ════════════════════════════════════════════════════════════════════════
   BET300 · Portal V17 — Navegación por PANTALLAS (no chat-stream)
   El backend (RPC) NO cambió. Cada acción abre su propia vista estable;
   el chat es la única pantalla con feed. Adiós scroll-jump al tocar botones.
   ════════════════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080f; --surface:#13131f; --surface-2:#1b1b2b;
  --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.14);
  --text:#f4f5fb; --muted:#9298ad;
  --gold:#f5c542; --gold-2:#ffd980; --green:#26d07c; --blue:#5b78ff; --danger:#ff5468;
  --r:20px; --r-sm:14px; --shadow:0 26px 80px rgba(0,0,0,.55);
  --font:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
button,input,textarea{font-family:var(--font)}
::selection{background:rgba(245,197,66,.3)}
.hidden{display:none!important}

#appFrame{position:fixed;inset:0;width:100vw;height:100vh;border:0;background:var(--bg);z-index:1}

/* ── Botón flotante ────────────────────────────────────────────────────── */
.float-btn{position:fixed;right:20px;bottom:20px;z-index:20;border:none;cursor:pointer;display:flex;align-items:center;gap:11px;
  padding:0 20px 0 14px;height:58px;border-radius:999px;background:linear-gradient(135deg,#ffdf7e,var(--gold) 55%,#e9a700);
  color:#231900;font-weight:800;font-size:15px;box-shadow:0 14px 34px rgba(245,197,66,.42),0 10px 40px rgba(0,0,0,.5);transition:transform .18s}
.float-btn:hover{transform:translateY(-2px)}.float-btn:active{transform:scale(.96)}
.float-btn .fb-ico{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.16);font-size:18px}
.float-btn .fb-sub{display:block;font-size:10px;font-weight:700;opacity:.7;letter-spacing:.3px;text-transform:uppercase;margin-top:-1px}
.float-badge{position:absolute;top:-4px;right:-2px;min-width:22px;height:22px;border-radius:999px;background:var(--danger);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--bg)}

/* ── Widget ────────────────────────────────────────────────────────────── */
.widget{position:fixed;right:20px;bottom:90px;z-index:30;width:404px;max-width:calc(100vw - 28px);height:640px;max-height:calc(100vh - 116px);
  background:linear-gradient(180deg,#15151f,#0c0c15);border:1px solid var(--line-2);border-radius:24px;box-shadow:var(--shadow);
  overflow:hidden;display:none;flex-direction:column}
.widget.open{display:flex;animation:popIn .26s cubic-bezier(.2,.9,.25,1)}
@keyframes popIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}

.widget-head{position:relative;flex-shrink:0;padding:14px 14px;display:flex;align-items:center;gap:11px;
  background:radial-gradient(140% 120% at 90% -20%,rgba(245,197,66,.20),transparent 50%),linear-gradient(135deg,#1b1c2c,#101019);border-bottom:1px solid var(--line)}
.head-avatar{width:40px;height:40px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--gold),#e6a400);color:#221900;font-weight:900;font-size:12px;box-shadow:0 6px 16px rgba(245,197,66,.3)}
.head-info{flex:1;min-width:0}
.brand-logo{font-size:16px;font-weight:900;letter-spacing:-.3px;line-height:1.1}.brand-logo span:first-child{color:var(--gold)}
.head-sub{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px}
.head-sub .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(38,208,124,.18)}
.icon-btn{border:none;background:rgba(255,255,255,.07);color:#d3d6e2;border-radius:11px;width:36px;height:36px;cursor:pointer;font-size:19px;line-height:1;transition:background .15s;flex-shrink:0}
.icon-btn:hover{background:rgba(255,255,255,.14)}

#connBanner{background:linear-gradient(90deg,#3a0d12,#4a1118);color:#ffb3bd;font-size:12px;font-weight:700;padding:8px 14px;align-items:center;gap:8px;border-bottom:1px solid rgba(255,84,104,.25);flex-shrink:0}

/* ── Contenedor de pantallas ───────────────────────────────────────────── */
.widget-main{flex:1;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;overflow-y:auto;padding:16px;
  background:radial-gradient(120% 70% at 12% 0%,rgba(91,120,255,.08),transparent 38%),radial-gradient(120% 70% at 100% 20%,rgba(245,197,66,.06),transparent 40%),var(--bg)}
.screen::-webkit-scrollbar{width:8px}.screen::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:8px}
#screenChat{padding:0;display:flex;flex-direction:column}
.screen-title{font-size:18px;font-weight:900;letter-spacing:-.3px;margin-bottom:14px}

/* ── Inicio ────────────────────────────────────────────────────────────── */
.hero{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.user-chip{display:inline-flex;align-items:center;gap:7px;background:rgba(245,197,66,.13);border:1px solid rgba(245,197,66,.3);color:var(--gold-2);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:800}
.link-btn{border:none;background:transparent;color:var(--gold-2);font-size:12.5px;font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:0}
.link-btn:hover{color:var(--gold)}
.menu-title{font-size:13px;color:var(--muted);font-weight:700;margin:6px 2px 10px}
.user-gate-title{font-weight:900;font-size:20px;margin-bottom:8px;letter-spacing:-.3px}
.welcome-txt{font-size:13.5px;color:#cfd3e2;line-height:1.5}
.flow-note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:10px}

.tiles{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.tile{position:relative;display:flex;flex-direction:column;align-items:flex-start;gap:8px;text-align:left;cursor:pointer;
  border:1px solid var(--line-2);background:linear-gradient(170deg,#1e1e30,#161623);color:var(--text);border-radius:18px;padding:15px 14px;min-height:104px;
  transition:transform .16s,border-color .16s,box-shadow .16s}
.tile:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(0,0,0,.32)}
.tile:active{transform:translateY(-1px) scale(.99)}
.tile:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.tile-ico{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;background:rgba(255,255,255,.06);border:1px solid var(--line)}
.tile-tx{font-weight:800;font-size:14.5px;line-height:1.2}.tile-tx small{display:block;color:var(--muted);font-size:11.5px;font-weight:600;margin-top:4px;line-height:1.3}
.tile.gold .tile-ico{background:rgba(245,197,66,.16);border-color:rgba(245,197,66,.4)}
.tile.green .tile-ico{background:rgba(38,208,124,.16);border-color:rgba(38,208,124,.36)}
.tile.wide{grid-column:1/-1;flex-direction:row;align-items:center;min-height:auto}
.tile .badge{position:absolute;top:11px;right:11px;min-width:20px;height:20px;border-radius:999px;background:var(--danger);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 5px}

.pending-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;
  background:linear-gradient(180deg,rgba(245,197,66,.12),rgba(245,197,66,.04));border:1px solid rgba(245,197,66,.32);border-radius:16px;padding:14px;margin-bottom:14px}
.pending-banner .chev{font-size:24px;color:var(--gold-2);line-height:1}
.pending-title{font-weight:900;color:var(--gold-2);font-size:14.5px}
.pending-text{font-size:12.5px;color:#cfd3e2;margin-top:3px;line-height:1.4}

/* ── Formularios (vista fija) ──────────────────────────────────────────── */
.form-card{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,0,0,.18)}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:#aab0c4;font-weight:800;margin-bottom:6px}
input,textarea{width:100%;border:1px solid var(--line-2);background:#0e0e19;color:var(--text);border-radius:var(--r-sm);padding:13px 14px;font-size:15px;margin-bottom:12px;transition:border-color .15s,box-shadow .15s}
input::placeholder,textarea::placeholder{color:#5a607a}
input:focus,textarea:focus{outline:none;border-color:rgba(245,197,66,.65);box-shadow:0 0 0 3px rgba(245,197,66,.16)}
textarea{resize:vertical;min-height:76px}
.muted-line{color:var(--muted);font-size:13px;padding:6px 0}

.action-btn{width:100%;border:none;border-radius:var(--r-sm);padding:14px;font-weight:900;font-size:14.5px;cursor:pointer;margin-top:2px;
  background:linear-gradient(135deg,#ffdf7e,var(--gold) 60%,#eaa800);color:#241a00;box-shadow:0 10px 24px rgba(245,197,66,.26);transition:transform .15s,box-shadow .15s,filter .15s}
.action-btn:hover{filter:brightness(1.04)}.action-btn:active{transform:scale(.985)}.action-btn:disabled{opacity:.6;cursor:default;box-shadow:none}
.secondary-btn{background:#23233a;color:var(--text);border:1px solid var(--line-2);box-shadow:none}.secondary-btn:hover{filter:none;background:#2b2b46}

/* ── Tarjeta de transferencia ──────────────────────────────────────────── */
.transfer-card{background:linear-gradient(180deg,#211f12,#14121c);border:1px solid rgba(245,197,66,.45);border-radius:18px;padding:15px;margin-bottom:14px;box-shadow:0 14px 30px rgba(0,0,0,.3)}
.transfer-title{font-weight:900;color:var(--gold);font-size:15px;margin-bottom:12px}
.transfer-field{background:#0c0c16;border-radius:13px;padding:11px 12px;margin-bottom:9px;border:1px solid var(--line)}
.transfer-label{font-size:10px;color:#9aa0b4;text-transform:uppercase;font-weight:800;letter-spacing:.5px;margin-bottom:5px}
.transfer-value{font-size:15px;font-weight:800;color:#fff;word-break:break-all;margin-bottom:9px}
.copy-btn{border:none;border-radius:11px;background:#26263e;color:#fff;padding:10px;font-size:12.5px;font-weight:800;cursor:pointer;width:100%;transition:background .15s}
.copy-btn:hover{background:#32324f}.copy-btn:active{background:var(--blue)}

/* ── Estado ────────────────────────────────────────────────────────────── */
.estado-card{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:var(--r);padding:22px 18px;text-align:center}
.estado-card.pending{border-color:rgba(245,197,66,.32);background:linear-gradient(180deg,rgba(245,197,66,.1),rgba(245,197,66,.03))}
.estado-card.ok{border-color:rgba(38,208,124,.4);background:linear-gradient(180deg,rgba(38,208,124,.12),rgba(38,208,124,.03))}
.estado-card.bad{border-color:rgba(255,84,104,.4);background:linear-gradient(180deg,rgba(255,84,104,.1),rgba(255,84,104,.03))}
.estado-ico{font-size:40px;margin-bottom:10px}
.estado-h{font-weight:900;font-size:18px;margin-bottom:6px}
.estado-sub{font-size:12.5px;color:var(--muted);margin-bottom:10px}
.estado-tx{font-size:13px;color:#cfd3e2;line-height:1.5;margin-bottom:14px}
.estado-live{font-size:12px;font-weight:800;color:var(--gold-2);background:rgba(245,197,66,.12);border:1px solid rgba(245,197,66,.25);border-radius:999px;padding:7px 12px;display:inline-block;margin-bottom:16px}
.estado-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.estado-actions .action-btn{margin:0}

/* ── Chat ──────────────────────────────────────────────────────────────── */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column}
.messages::-webkit-scrollbar{width:8px}.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:8px}
.msg{display:flex;flex-direction:column;margin-bottom:12px;max-width:90%;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.bot,.msg.sys{align-items:flex-start;margin-right:auto}.msg.user{align-items:flex-end;margin-left:auto}
.bubble{padding:11px 14px;border-radius:18px;font-size:13.5px;line-height:1.45;word-break:break-word;white-space:pre-wrap;box-shadow:0 8px 20px rgba(0,0,0,.2)}
.msg.bot .bubble,.msg.sys .bubble{background:var(--surface-2);color:#eef0f7;border:1px solid var(--line);border-bottom-left-radius:6px}
.msg.user .bubble{background:linear-gradient(135deg,#4f6bff,#7b8cff);color:#fff;border-bottom-right-radius:6px}
.meta{font-size:10.5px;color:var(--muted);padding:4px 5px 0}
.bubble img.chat-img{max-width:100%;border-radius:12px;margin-top:8px;display:block;cursor:pointer;border:1px solid var(--line-2)}
.status-pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:800;background:rgba(245,197,66,.14);color:var(--gold-2);border:1px solid rgba(245,197,66,.3);margin:8px 0 2px}

/* ── Compose (solo en chat) ────────────────────────────────────────────── */
.widget-compose{flex-shrink:0;border-top:1px solid var(--line);background:#0f0f1a;padding:12px;display:grid;grid-template-columns:44px 1fr 46px;gap:9px;align-items:end}
#freeInput{min-height:44px;height:44px;max-height:96px;overflow:auto;margin:0;resize:none;border-radius:14px;font-size:14px;padding:11px 13px}
.send-btn{height:44px;width:46px;padding:0;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;background:linear-gradient(135deg,#5b78ff,#7b8cff);color:#fff;box-shadow:0 8px 18px rgba(91,120,255,.35);transition:transform .15s}
.send-btn:active{transform:scale(.92)}
.clip-btn{height:44px;width:44px;padding:0;border:none;border-radius:14px;background:rgba(255,255,255,.07);color:#aeb3c6;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.clip-btn:hover{background:rgba(255,255,255,.15)}
#imgPreviewBar{display:flex;align-items:center;background:#0f0f1a;padding:8px 12px;border-top:1px solid var(--line);flex-shrink:0}
#imgPreviewBar .img-bar-inner{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.06);border-radius:11px;padding:6px 9px;width:100%}
#imgPreviewBar img{width:36px;height:36px;object-fit:cover;border-radius:8px;flex-shrink:0}
#imgPreviewBar span{font-size:11.5px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#imgPreviewBar button{border:none;background:none;color:var(--muted);cursor:pointer;font-size:21px;line-height:1;padding:0 2px;flex-shrink:0}

/* Toast */
.toast{position:fixed;left:50%;bottom:106px;transform:translateX(-50%) translateY(10px);z-index:60;background:#16161f;color:#fff;border:1px solid var(--line-2);box-shadow:var(--shadow);padding:13px 18px;border-radius:14px;font-weight:800;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:320px;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:700px){
  .float-btn{right:14px;bottom:16px;height:54px}
  .widget{right:10px;left:10px;bottom:80px;width:auto;height:76vh;max-height:76vh;border-radius:22px}
}
@media(max-width:420px){
  .tiles{grid-template-columns:1fr}
  .float-btn .fb-text{display:none}.float-btn{padding:0;width:54px;justify-content:center;gap:0}.float-btn .fb-ico{margin:0}
  .widget{height:82vh;max-height:82vh}
}
</style>
</head>

<script>
const SUPABASE_URL = "https://pjvvyvfcwjoocjqvdror.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_NYqRoKptTgcL90VAVF2kqA_Gl06mEUF";
const DEFAULT_ROUTE = "rt-a8f31";
const PLATFORM_URL = "https://bet-300.pw";
let sb=null;try{if(SUPABASE_ANON_KEY&&!SUPABASE_ANON_KEY.includes("PEGAR_"))sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)}catch(e){console.warn(e)}

const state={
  publicCode:new URLSearchParams(location.search).get("r")||DEFAULT_ROUTE,
  pcCodigo:null,
  usuario:localStorage.getItem("bet300_usuario")||"",
  solicitudId:localStorage.getItem("bet300_solicitud_id")||"",
  chatId:localStorage.getItem("bet300_chat_id")||"",
  chatToken:localStorage.getItem("bet300_chat_token")||"",
  selectedFile:null, billetera:null, chatLibre:false, composerImage:null,
  pendingTipo:localStorage.getItem("bet300_pending_tipo")||"",
  seenMsgIds:new Set(),
  portalThreadSeen:new Set(JSON.parse(localStorage.getItem("bet300_portal_thread_seen")||"[]")),
  shownTexts:new Set(),
  solicitudStartedAt:Number(localStorage.getItem("bet300_solicitud_started_at")||0),
  screen:"home", unread:0, chatGreeted:false
};

let chatPollTimer=null, estadoPollTimer=null, portalThreadTimer=null, estadoFinalNotificado=false, rechazadoStreak=0;

function $(id){return document.getElementById(id)}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1)}
function esc(t){return String(t??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function escMsg(t){return esc(t).replace(/\n/g,"<br>")}
function now(){return new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})}
function tipoLabel(){const t=state.pendingTipo||"Solicitud";return t.charAt(0)+t.slice(1).toLowerCase()}
function tiempoEspera(){
  const started=Number(state.solicitudStartedAt||localStorage.getItem("bet300_solicitud_started_at")||0);
  if(!started)return "";
  const mins=Math.round((Date.now()-started)/60000);
  if(mins<2)return "Hace unos instantes";
  if(mins<60)return `Hace ${mins} min`;
  const hs=Math.round(mins/60);
  return `Hace ${hs} hora${hs>1?"s":""}`;
}
function toast(t){const el=$("toast");el.textContent=t;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2400)}

// ── Monitor de conexión ────────────────────────────────────────────────────
let _connFails=0;
function _showOffline(){const b=$("connBanner");if(b)b.style.display="flex";}
function _hideOffline(){const b=$("connBanner");if(b)b.style.display="none";_connFails=0;}
function _onPollOk(){if(_connFails>0)_hideOffline();_connFails=0;}
function _onPollFail(){_connFails++;if(_connFails>=3)_showOffline();}
window.addEventListener("offline",()=>_showOffline());
window.addEventListener("online",()=>{
  _hideOffline();
  if(!$("widget")?.classList.contains("open"))return;
  if(state.chatId)startChatPoll();
  if(state.usuario)startPortalThreadPoll();
  if(tieneSolicitudPendiente())startEstadoPoll();
});

// ── Router de pantallas ────────────────────────────────────────────────────
const SCREENS=["home","carga","retiro","clave","estado","chat"];
function showScreen(name){
  state.screen=name;
  SCREENS.forEach(s=>{const el=$("screen"+cap(s));if(el)el.classList.toggle("hidden",s!==name);});
  $("backBtn").classList.toggle("hidden",name==="home");
  $("composeBox").classList.toggle("hidden",name!=="chat");
  if(name!=="chat")$("imgPreviewBar").classList.add("hidden");
  const sc=$("screen"+cap(name));
  if(sc&&name!=="chat")sc.scrollTop=0;
  if(name==="chat"){state.chatLibre=true;clearUnread();setTimeout(scrollChat,30);}
  else state.chatLibre=false;
}
function goHome(){renderHome();showScreen("home");}
function goCarga(){if(bloquearNuevaSolicitud("CARGA"))return;showScreen("carga");renderCarga();}
function goRetiro(){if(bloquearNuevaSolicitud("RETIRO"))return;showScreen("retiro");renderRetiro();}
function goClave(){showScreen("clave");renderClave();}
function goEstado(){showScreen("estado");renderEstado();}
function goChat(){showScreen("chat");renderChat();}

// ── No leídos ──────────────────────────────────────────────────────────────
function updateUnreadUI(){
  const fb=$("floatUnread"),hb=$("homeUnread");
  [fb,hb].forEach(el=>{if(el){el.textContent=state.unread>99?"99+":state.unread;el.classList.toggle("hidden",!state.unread);}});
}
function bumpUnread(){state.unread++;updateUnreadUI();}
function clearUnread(){state.unread=0;updateUnreadUI();}

function toggleWidget(open){
  $("widget").classList.toggle("open",!!open);
  if(open){
    renderHome();
    showScreen(state.screen||"home");
    if(state.chatId)startChatPoll();
    if(state.usuario)startPortalThreadPoll();
    if(tieneSolicitudPendiente())startEstadoPoll();
  }else{
    stopChatPoll();stopPortalThreadPoll();stopEstadoPoll();
  }
}

// ── Chat (mensajes) ────────────────────────────────────────────────────────
function scrollChat(){const m=$("messages");if(m)m.scrollTop=m.scrollHeight;}
function scrollBottom(){scrollChat();}
function addMsg(text,who="bot",imgUrl=null){
  const wrap=document.createElement("div");
  wrap.className="msg "+(who==="user"?"user":"bot");
  const imgHtml=imgUrl?`<img class="chat-img" src="${esc(imgUrl)}" onclick="window.open('${esc(imgUrl)}','_blank')" onerror="this.style.display='none'" alt="imagen">`:""
  wrap.innerHTML='<div class="bubble">'+String(text)+imgHtml+'</div><div class="meta">'+(who==="user"?"Vos":"BET300")+" · "+now()+'</div>';
  $("messages").appendChild(wrap);scrollChat();
}
function incomingOperatorMsg(texto,imgUrl){
  addMsg(escMsg(texto),"bot",imgUrl||null);
  if(state.screen!=="chat"||!$("widget")?.classList.contains("open"))bumpUnread();
}
function renderChat(){
  if(!state.chatGreeted&&!$("messages").children.length){
    state.chatGreeted=true;
    addMsg("Hola 👋 Escribinos tu consulta o mandá tu comprobante. Un operador te responde por acá.","bot");
  }
  setTimeout(()=>$("freeInput")?.focus(),80);
  setTimeout(()=>subscribePush(),1200);
}

async function rpc(fn,params){if(!sb)return{data:null,error:{message:"Supabase no configurado"}};const{data,error}=await sb.rpc(fn,params||{});return{data,error}}
function normalize(data){if(!data)return null;if(Array.isArray(data))return data[0]||null;if(data.data)return Array.isArray(data.data)?data.data[0]:data.data;return data}

// ── Chat poll ─────────────────────────────────────────────────────────────
function startChatPoll(){stopChatPoll();if(!state.chatId)return;chatPollTimer=setInterval(pollOperatorMessages,3500);}
function stopChatPoll(){if(chatPollTimer){clearInterval(chatPollTimer);chatPollTimer=null;}}
async function pollOperatorMessages(){
  if(!state.chatId||!$("widget")?.classList.contains("open"))return;
  const res=await rpc("landing_leer_chat_v2",{p_chat_id:Number(state.chatId),p_chat_token:state.chatToken});
  if(res.error||!Array.isArray(res.data)){_onPollFail();return;}
  _onPollOk();
  res.data.forEach(m=>{
    const msgKey=String(m.id||m.created_at||JSON.stringify(m));
    if(state.seenMsgIds.has(msgKey))return;
    state.seenMsgIds.add(msgKey);
    const emisor=String(m.tipo_emisor||m.emisor||"").toUpperCase();
    const isOp=emisor.includes("OPER")||emisor.includes("ADMIN")||emisor.includes("PANEL")||emisor.includes("SIST")||emisor.includes("BOT")||emisor.includes("AUTO");
    const texto=m.mensaje||m.texto||"";
    if(isOp&&(texto||m.imagen_url)){const tk=(texto||m.imagen_url||"").substring(0,200);if(state.shownTexts.has(tk))return;state.shownTexts.add(tk);incomingOperatorMsg(texto,m.imagen_url||null);if(texto)notificarLocal("BET300 · Operador",texto.substring(0,100),"/","bet300-op");}
  });
}

// ── Portal metadata thread poll (respuestas desde panel/NODO) ─────────────
function savePortalThreadSeen(){
  try{localStorage.setItem("bet300_portal_thread_seen",JSON.stringify([...state.portalThreadSeen].slice(-400)));}catch(e){}
}
function startPortalThreadPoll(){
  stopPortalThreadPoll();
  if(!state.usuario)return;
  portalThreadTimer=setInterval(pollPortalThread,3500);
  setTimeout(pollPortalThread,900);
}
function stopPortalThreadPoll(){
  if(portalThreadTimer){clearInterval(portalThreadTimer);portalThreadTimer=null;}
}
function threadKey(m){
  return String((m?.origen||"")+"|"+(m?.solicitud_id||"")+"|"+(m?.fecha||"")+"|"+(m?.mensaje||""));
}
async function pollPortalThread(){
  if(!state.usuario||!$("widget")?.classList.contains("open"))return;
  const res=await rpc("landing_portal_chat_thread_get",{p_usuario:state.usuario,p_public_code:state.publicCode});
  if(res.error){console.warn("[chat_thread]",res.error);_onPollFail();return;}
  _onPollOk();
  const d=normalize(res.data)||res.data||{};
  const thread=Array.isArray(d.chat_thread)?d.chat_thread:[];
  if(!thread.length)return;

  thread.forEach(m=>{
    const key=threadKey(m);
    if(state.portalThreadSeen.has(key))return;
    state.portalThreadSeen.add(key);

    const origen=String(m.origen||"").toUpperCase();
    const texto=m.mensaje||"";
    // Mostramos en portal solo respuestas del panel/operador para evitar duplicar mensajes propios
    if(origen==="OPERADOR"&&(texto||m.imagen_url||m.imagen)){
      const imgUrl=m.imagen_url||m.imagen||null;
      const tk=texto?texto.substring(0,200):(m.fecha||"")+"|img|"+(imgUrl||"").substring(0,80);
      if(state.shownTexts.has(tk))return;
      state.shownTexts.add(tk);
      incomingOperatorMsg(texto,imgUrl);
      if(!texto&&imgUrl)notificarLocal("BET300 · Operador","[Imagen]","/","bet300-op");
    }
  });
  savePortalThreadSeen();
}

// ── Estado poll ───────────────────────────────────────────────────────────
function estadoNormalizado(v){return String(v||"").trim().toUpperCase();}
function esEstadoFinalAprobado(v){
  const e=estadoNormalizado(v);
  // Solo estados verdaderamente finales — APROBADA_MANUAL es intermedio (pre-ejecución)
  return ["ACREDITADA","PAGADA","COMPLETADA"].includes(e);
}
function esEstadoFinalRechazado(v){
  const e=estadoNormalizado(v);
  return ["RECHAZADA","CANCELADA","ERROR"].includes(e);
}
// Acepta IDs numéricos O strings no vacíos (UUIDs también son válidos)
function solicitudIdValido(){
  const raw=String(state.solicitudId||"").trim();
  if(!raw)return null;
  return /^\d+$/.test(raw) ? Number(raw) : raw;
}
function stopEstadoPoll(){if(estadoPollTimer){clearInterval(estadoPollTimer);estadoPollTimer=null;}}
function startEstadoPoll(){
  stopEstadoPoll();
  if(!solicitudIdValido())return;
  estadoPollTimer=setInterval(()=>consultarEstadoSolicitud(false),4000);
  setTimeout(()=>consultarEstadoSolicitud(false),800);
}

function limpiarPendienteAprobado(obs){
  if(estadoFinalNotificado)return;
  estadoFinalNotificado=true;
  stopEstadoPoll();stopChatPoll();
  const tipoFinal=state.pendingTipo||"CARGA";
  state.pendingTipo="";state.solicitudId="";state.chatId="";state.chatToken="";state.seenMsgIds=new Set();state.shownTexts=new Set();
  ["bet300_pending_tipo","bet300_solicitud_id","bet300_chat_id","bet300_chat_token","bet300_solicitud_started_at"].forEach(k=>localStorage.removeItem(k));
  const esRetiro=tipoFinal==="RETIRO";
  const titulo=esRetiro?"¡Retiro procesado!":"¡Carga acreditada!";
  const sub=esRetiro?"Revisá tu cuenta bancaria.":"Ya podés jugar.";
  const s=$("screenEstado");
  if(s)s.innerHTML=`<div class="screen-title">🧾 Estado</div>
    <div class="estado-card ok">
      <div class="estado-ico">🎉</div>
      <div class="estado-h">${titulo}</div>
      <div class="estado-sub">${sub}</div>
      ${obs?`<div class="estado-tx">${escMsg(obs)}</div>`:""}
      <div class="estado-actions"><button class="action-btn" onclick="goHome()">Volver al inicio</button><button class="action-btn secondary-btn" onclick="goChat()">Chat</button></div>
    </div>`;
  renderHome();
  if($("widget")?.classList.contains("open"))showScreen("estado");
  const notifTitulo=esRetiro?"BET300 · ¡Retiro procesado!":"BET300 · ¡Carga acreditada!";
  const notifCuerpo=obs||(esRetiro?"Tu retiro fue transferido. Revisá tu cuenta.":"¡Tus fichas ya están disponibles! Revisá tu cuenta.");
  notificarLocal(notifTitulo,notifCuerpo,"/","bet300-acreditada");
}
function esConfirmacionDemasiadoTemprana(){
  const started=Number(state.solicitudStartedAt||localStorage.getItem("bet300_solicitud_started_at")||0);
  if(!started)return false;
  return (Date.now()-started)<8000;
}
async function consultarEstadoSolicitud(mostrarMensaje=true){
  const sid=solicitudIdValido();
  if(!sid){if(mostrarMensaje)toast("No hay una solicitud válida para consultar.");return null;}
  const chatIdNum=/^\d+$/.test(String(state.chatId||""))?Number(state.chatId):null;
  const res=await rpc("landing_estado_solicitud_segura",{
    p_solicitud_id:typeof sid==="number"?sid:0,
    p_chat_id:chatIdNum,
    p_chat_token:state.chatToken||""
  });
  if(res.error){if(mostrarMensaje)toast("No pude consultar el estado ahora.");return null;}
  const d=normalize(res.data)||res.data||{};
  if(d.ok===false){setEstadoLive("⏳ En verificación");return "PENDIENTE";}
  const estado=estadoNormalizado(d.estado||d.status||d.estado_solicitud);
  const obs=String(d.obs||d.observacion||d.motivo||d.razon||"").trim();
  if(esEstadoFinalAprobado(estado)){
    if(esConfirmacionDemasiadoTemprana()){setEstadoLive("⏳ En verificación");return "PENDIENTE";}
    limpiarPendienteAprobado(obs);
    return estado;
  }
  if(esEstadoFinalRechazado(estado)){
    rechazadoStreak++;
    // Confirmar con 3 polls consecutivos antes de mostrar rechazo (evita falsos positivos de estados transitorios)
    if(rechazadoStreak < 3){setEstadoLive("⏳ En verificación");return "PENDIENTE";}
    stopEstadoPoll();
    rechazadoStreak=0;
    state.pendingTipo="";state.solicitudId="";
    ["bet300_pending_tipo","bet300_solicitud_id","bet300_solicitud_started_at"].forEach(k=>localStorage.removeItem(k));
    const s=$("screenEstado");
    if(s)s.innerHTML=`<div class="screen-title">🧾 Estado</div>
      <div class="estado-card bad">
        <div class="estado-ico">⚠️</div>
        <div class="estado-h">Tu solicitud no pudo procesarse</div>
        ${obs?`<div class="estado-tx">${escMsg(obs)}</div>`:`<div class="estado-tx">Escribinos por el chat y un operador te ayuda.</div>`}
        <div class="estado-actions"><button class="action-btn" onclick="goChat()">💬 Consultar</button><button class="action-btn secondary-btn" onclick="goCarga()">Nueva carga</button></div>
      </div>`;
    renderHome();
    if($("widget")?.classList.contains("open"))showScreen("estado");
    return estado;
  }
  rechazadoStreak=0; // resetear streak si el estado no es rechazo
  setEstadoLive("⏳ En verificación");
  return estado||"PENDIENTE";
}
async function verEstado(){
  if($("screenEstado").classList.contains("hidden"))goEstado();
  else await consultarEstadoSolicitud(true);
}

// ── Validación usuario ────────────────────────────────────────────────────
async function iniciarValidacionUsuarioBackground(usuario){
  const u=String(usuario||"").trim();
  if(!u)return;
  try{
    const r=await rpc("landing_validar_usuario_login",{p_usuario:u,p_pc_codigo:state.pcCodigo||"P1"});
    if(r.error)return;
    const row=normalize(r.data)||r.data||{};
    const validacionId=row.validacion_id||row.id||null;
    if(validacionId)localStorage.setItem("bet300_validacion_id",String(validacionId));
    if(validacionId){
      let intentos=0;
      const t=setInterval(async()=>{
        intentos++;
        if(intentos>8){clearInterval(t);return;}
        const st=await rpc("landing_estado_validacion_usuario",{p_validacion_id:Number(validacionId)});
        if(st.error)return;
        const sr=normalize(st.data)||st.data||{};
        const estado=estadoNormalizado(sr.estado||sr.status);
        if(["EXISTE","EXISTIR","NO_EXISTE","ERROR","RECHAZADO"].includes(estado)){clearInterval(t);localStorage.setItem("bet300_validacion_estado",estado);}
      },2500);
    }
  }catch(e){}
}

// ── Ruta e inicialización ─────────────────────────────────────────────────
async function initRoute(){
  const r=await rpc("landing_resolver_ruta_publica",{p_public_code:state.publicCode});
  if(!r.error){const row=normalize(r.data);state.pcCodigo=row?.pc_codigo||row?.pc||row?.codigo_pc||null;}

// ── Image upload (comprobantes + chat) ───────────────────────────────────
async function subirImagen(file){
  if(!sb||!file)return null;
  if(file.size>5*1024*1024){toast("El archivo supera 5 MB");return null;}
  const ext=(file.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,"jpg");
  const path=`${(state.usuario||"anonimo").replace(/[^a-z0-9_-]/gi,"_")}/${Date.now()}_${Math.random().toString(36).slice(2,6)}.${ext}`;
  try{
    const{data:upData,error}=await sb.storage.from("comprobantes").upload(path,file,{cacheControl:"3600",upsert:true,contentType:file.type});
    if(error){console.error("[img upload error]",error.message||error);toast("No se pudo subir la imagen");return null;}
    const{data:urlData}=sb.storage.from("comprobantes").getPublicUrl(path);
    const url=urlData?.publicUrl||null;
    console.log("[img upload ok]",url);
    return url;
  }catch(e){console.error("[img upload exception]",e);return null;}
}

// ── Billetera ─────────────────────────────────────────────────────────────
function inferirTipoBilletera(b){
  const raw=[b?.banco,b?.tipo,b?.nombre_visible,b?.nombre,b?.alias,b?.cbu,b?.cvu].map(x=>String(x||"").toUpperCase()).join(" ");
  const alias=String(b?.alias||"").toLowerCase();
  const cbu=String(b?.cbu||b?.cvu||"");
  if(alias.endsWith(".mp")||cbu.startsWith("00000031")||raw.includes("MERCADO"))return "Mercado Pago";
  if(raw.includes("NARANJA")||raw.includes("NX")||cbu.startsWith("453"))return "Naranja X";
  if(raw.includes("UALA")||raw.includes("UALÁ"))return "Ualá";
  if(raw.includes("PERSONAL"))return "Personal Pay";
  if(raw.includes("BRUBANK"))return "Brubank";
  if(raw.includes("BANCO"))return "Banco";
  return "Billetera";
}
async function obtenerBilletera(){
  const pcs=[state.pcCodigo,"P1"].map(v=>String(v||"").trim().toUpperCase()).filter(Boolean);
  for(const pc of [...new Set(pcs)]){
    const segura=await rpc("landing_obtener_billetera_segura",{
      p_validacion_usuario_id:Number(localStorage.getItem("bet300_validacion_id")||0),
      p_usuario:state.usuario||"",p_nombre_completo:state.usuario||"",
      p_telefono:"",p_dni:"",p_pc_codigo:pc
    });
    if(!segura.error&&segura.data&&segura.data.length){state.billetera=normalize(segura.data)||segura.data[0];return state.billetera;}
    const publica=await rpc("landing_obtener_billetera",{p_pc_codigo:pc});
    if(!publica.error&&publica.data&&publica.data.length){state.billetera=normalize(publica.data)||publica.data[0];return state.billetera;}
  }
  state.billetera=null;return null;
}
function billeteraPayloadPlano(){
  const b=state.billetera||{};
  return {billetera_id:b.id||b.billetera_id||null,billetera_nombre:b.nombre_visible||b.nombre||"",billetera_titular:b.titular||"",billetera_alias:b.alias||"",billetera_cbu:b.cbu||b.cvu||"",billetera_banco:inferirTipoBilletera(b)};
}

// ── Push PWA ──────────────────────────────────────────────────────────────
const VAPID_PUB_KEY="BAH2MtolgsjjO31mPNwMi0WIl-T4LEDocaGSc1F3RUE0F7ZOF-1eJ1gXSuisalnR6tu0ZYcISWtnRdH-S5MFYBw";
function _vapidKey(b64){
  const pad="=".repeat((4-b64.length%4)%4);
  const raw=atob((b64+pad).replace(/-/g,"+").replace(/_/g,"/"));
  const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);
  return out;
}
async function subscribePush(){
  if(!("serviceWorker" in navigator)||!("PushManager" in window)||!state.usuario)return;
  try{
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      const perm=await Notification.requestPermission();
      if(perm!=="granted")return;
      sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:_vapidKey(VAPID_PUB_KEY)});
    }
    await fetch("/api/save-subscription",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({usuario:state.usuario,pc_codigo:state.pcCodigo||"P1",subscription:sub.toJSON()})
    });
  }catch(e){console.warn("[BET300 push]",e);}
}
async function notificarLocal(title,body,url,tag){
  if(!("serviceWorker" in navigator)||Notification.permission!=="granted")return;
  // Solo si la página está oculta O el widget está cerrado
  if(document.visibilityState==="visible"&&$("widget")?.classList.contains("open"))return;
  try{
    const reg=await navigator.serviceWorker.ready;
    reg.showNotification(title,{body,icon:"/icons/icon-192.png",badge:"/icons/badge-72.png",
      tag:tag||"bet300",renotify:true,data:{url:url||"/"},vibrate:[200,80,200]});
  }catch(e){}
}

// ── Aviso de solicitud muy vieja (más de 24h) ─────────────────────────────
function chequearPendienteViejo(){
  if(!tieneSolicitudPendiente())return;
  const started=Number(state.solicitudStartedAt||localStorage.getItem("bet300_solicitud_started_at")||0);
  if(!started)return;
  const hs=(Date.now()-started)/3600000;
  if(hs<24)return;
  setTimeout(()=>toast(`Tu solicitud lleva +${Math.round(hs)}h. Si ya fue procesada, marcala como resuelta en Estado.`),3000);
}

  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendFreeMessage();}
});

// ── Paste de imagen en el chat (Ctrl+V) ──────────────────────────────────
document.addEventListener("paste",e=>{
  if(state.screen!=="chat")return;
  const items=[...(e.clipboardData?.items||[])];
  const imgItem=items.find(it=>it.type.startsWith("image/"));
  if(!imgItem)return;
  e.preventDefault();
  const file=imgItem.getAsFile();
  if(!file)return;
  state.composerImage=file;
  const thumb=$("imgPreviewThumb"),nom=$("imgPreviewName"),bar=$("imgPreviewBar");
  if(!bar)return;
  nom.textContent="Imagen pegada del portapapeles";
  thumb.src=URL.createObjectURL(file);
  thumb.style.display="";
  bar.classList.remove("hidden");
});
